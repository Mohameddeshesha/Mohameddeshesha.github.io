<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mohamed El Sayed Deshesha | Data Analyst & AI Practitioner</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #050b12;
    --bg2: #080f18;
    --surface: #0c1623;
    --border: #1a2d42;
    --cyan: #00d4ff;
    --cyan2: #00ffcc;
    --text: #c8d8e8;
    --muted: #5a7a95;
    --white: #eef5ff;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 400;
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* ── CANVAS BG ── */
  #canvas-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    opacity: 0.35;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.2rem 4rem;
    background: rgba(5,11,18,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-family: var(--mono);
    font-size: 0.85rem;
    color: var(--cyan);
    letter-spacing: 0.08em;
    text-decoration: none;
  }

  .nav-links {
    display: flex;
    gap: 2.2rem;
    list-style: none;
  }

  .nav-links a {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--cyan); }

  /* ── SECTIONS ── */
  section {
    position: relative;
    z-index: 1;
    padding: 7rem 4rem;
    max-width: 1100px;
    margin: 0 auto;
  }

  .full-width {
    max-width: none;
    padding-left: 0; padding-right: 0;
  }

  /* ── HERO ── */
  #hero {
    min-height: 100vh;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    gap: 3rem;
    padding-top: 6rem;
    max-width: 1100px;
    margin: 0 auto;
  }

  .hero-content {
    flex: 1;
    max-width: 600px;
  }

  /* ── AI IMAGE FRAME ── */
  .hero-image-wrapper {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    animation: fadeUp 0.7s 0.6s forwards;
  }

  .ai-frame {
    position: relative;
    width: 350px;
    height: 350px;
    border-radius: 50%;
    padding: 6px;
    background: linear-gradient(45deg, var(--cyan), #8a2be2, var(--cyan2));
    background-size: 200% 200%;
    animation: gradientShift 5s ease infinite, float 6s ease-in-out infinite;
    box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
    z-index: 1;
  }

  .ai-frame::after {
    content: '';
    position: absolute;
    inset: -15px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, transparent 60%, var(--cyan) 80%, #b200ff 100%);
    animation: spin 4s linear infinite;
    z-index: -1;
    filter: blur(15px);
  }

  .profile-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    border: 5px solid var(--bg);
    position: relative;
    z-index: 2;
  }

  .hero-tag {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--cyan);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeUp 0.6s 0.2s forwards;
  }

  .hero-name {
    font-family: var(--mono);
    font-size: clamp(2.5rem, 5vw, 4.5rem);
    color: var(--white);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.03em;
    margin-bottom: 1rem;
    opacity: 0;
    animation: fadeUp 0.7s 0.4s forwards;
  }

  .hero-name span {
    color: var(--cyan);
    position: relative;
  }

  .hero-role {
    font-family: var(--mono);
    font-size: clamp(1rem, 2vw, 1.4rem);
    color: var(--muted);
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp 0.7s 0.6s forwards;
  }

  #typed-role {
    color: var(--cyan2);
    border-right: 2px solid var(--cyan2);
    animation: blink 0.8s step-end infinite;
  }

  @keyframes blink { 50% { border-color: transparent; } }

  .hero-summary {
    font-size: 1.05rem;
    color: var(--text);
    margin-bottom: 3rem;
    line-height: 1.8;
    opacity: 0;
    animation: fadeUp 0.7s 0.8s forwards;
  }

  .hero-cta {
    display: flex;
    gap: 1.2rem;
    flex-wrap: wrap;
    opacity: 0;
    animation: fadeUp 0.7s 1s forwards;
  }

  .btn-primary {
    display: inline-block;
    padding: 0.85rem 2rem;
    background: var(--cyan);
    color: #050b12;
    font-family: var(--mono);
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    transition: background 0.2s, transform 0.2s;
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
  }
  .btn-primary:hover { background: var(--cyan2); transform: translateY(-2px); }

  .btn-outline {
    display: inline-block;
    padding: 0.85rem 2rem;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    transition: border-color 0.2s, color 0.2s, transform 0.2s;
  }
  .btn-outline:hover { border-color: var(--cyan); color: var(--cyan); transform: translateY(-2px); }

  .hero-stats {
    display: flex;
    gap: 3rem;
    margin-top: 4rem;
    padding-top: 2rem;
    border-top: 1px solid var(--border);
    opacity: 0;
    animation: fadeUp 0.7s 1.2s forwards;
  }

  .stat-num {
    font-family: var(--mono);
    font-size: 2rem;
    color: var(--cyan);
    font-weight: 700;
  }
  .stat-label {
    font-size: 0.8rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* ── SECTION HEADERS ── */
  .section-label {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--cyan);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 0.6rem;
  }

  .section-title {
    font-family: var(--mono);
    font-size: clamp(1.8rem, 3.5vw, 2.8rem);
    color: var(--white);
    font-weight: 700;
    margin-bottom: 1rem;
    line-height: 1.15;
  }

  .section-divider {
    width: 48px;
    height: 2px;
    background: var(--cyan);
    margin-bottom: 3.5rem;
  }

  /* ── ABOUT ── */
  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5rem;
    align-items: start;
  }

  .about-text p {
    margin-bottom: 1.2rem;
    color: var(--text);
    font-size: 1rem;
  }

  .about-highlight {
    color: var(--cyan);
    font-weight: 600;
  }

  .about-cards {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .info-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1.2rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    transition: border-color 0.2s, transform 0.2s;
  }
  .info-card:hover { border-color: var(--cyan); transform: translateX(4px); }

  .info-card-icon {
    font-size: 1.3rem;
    width: 2.5rem;
    text-align: center;
    flex-shrink: 0;
  }

  .info-card-label {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.1rem;
  }
  .info-card-value { color: var(--white); font-size: 0.9rem; }

  /* ── SKILLS ── */
  #skills { background: var(--bg2); }

  .skills-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
  }

  .skill-group {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1.8rem;
    transition: border-color 0.25s, transform 0.25s;
  }
  .skill-group:hover { border-color: var(--cyan); transform: translateY(-4px); }

  .skill-group-title {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 1.2rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .skill-group-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .skill-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .skill-tag {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text);
    background: rgba(0,212,255,0.06);
    border: 1px solid rgba(0,212,255,0.15);
    padding: 0.3rem 0.7rem;
    letter-spacing: 0.04em;
    transition: background 0.2s, color 0.2s;
  }
  .skill-tag:hover { background: rgba(0,212,255,0.15); color: var(--cyan); }

  /* ── EXPERIENCE ── */
  .timeline {
    position: relative;
    padding-left: 2rem;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0.5rem;
    bottom: 0;
    width: 1px;
    background: var(--border);
  }

  .timeline-item {
    position: relative;
    margin-bottom: 3.5rem;
    opacity: 0;
    transform: translateX(-20px);
    transition: opacity 0.5s, transform 0.5s;
  }
  .timeline-item.visible { opacity: 1; transform: translateX(0); }

  .timeline-dot {
    position: absolute;
    left: -2rem;
    top: 0.4rem;
    width: 10px;
    height: 10px;
    background: var(--bg);
    border: 2px solid var(--cyan);
    transform: translateX(-50%) rotate(45deg);
    transition: background 0.2s;
  }
  .timeline-item:hover .timeline-dot { background: var(--cyan); }

  .timeline-date {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--cyan);
    letter-spacing: 0.1em;
    margin-bottom: 0.4rem;
  }

  .timeline-role {
    font-family: var(--mono);
    font-size: 1.1rem;
    color: var(--white);
    font-weight: 700;
    margin-bottom: 0.2rem;
  }

  .timeline-company {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  .timeline-bullets {
    padding-left: 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

    font-size: 0.
